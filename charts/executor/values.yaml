# -- Number of workspace replicas (must be 1 for RWO PVC)
replicaCount: 1

image:
  # -- Image registry
  registry: ghcr.io
  # -- Image repository
  repository: def4alt/pi-executor
  # -- Image tag (overrides appVersion from Chart.yaml)
  tag: ""
  # -- Pull policy
  pullPolicy: IfNotPresent
  # -- Pull secrets for private registries
  pullSecrets: []

# -- Container name used in templates
containerName: executor

# -- Workspace configuration
workspace:
  # -- PVC size for workspace storage (repo, logs, caches, artifacts)
  size: 20Gi
  # -- StorageClass name (set to "longhorn" for Longhorn, "" for default)
  storageClass: "longhorn"
  # -- Persistent volume reclaim policy: Retain or Delete
  storageReclaimPolicy: Retain
  # -- Access mode for the workspace PVC
  accessModes:
    - ReadWriteOnce
  # -- Mount path inside the pod
  mountPath: /workspace

# -- Git repository to clone into the workspace
repo:
  # -- Repository URL (required). Set to "" if using pre-populated PVC
  url: ""
  # -- Branch, tag, or commit reference
  ref: main
  # -- Alternative: name of an existing PVC that already contains the repo
  existingPvc: ""

# -- SSH key secret for private repo access
ssh:
  # -- Name of a Secret containing SSH keys (expected key: id_rsa or ssh-privatekey)
  existingSecret: ""
  # -- Mount path for SSH keys inside the container
  mountPath: /home/workspace/.ssh

# -- Pi agent configuration
pi:
  # -- Pi command (default: pi)
  cmd: pi
  # -- Additional arguments passed to pi (e.g. "--model gpt-4")
  args: ""
  # -- Log file path relative to workspace mount
  logFile: /workspace/logs/pi.log
  # -- Config file content (optional, will be written to ~/.config/pi/config.json)
  config: {}

# -- tmux configuration
tmux:
  # -- tmux session name
  sessionName: main

# -- ttyd configuration
ttyd:
  # -- Container port for ttyd
  port: 7681
  # -- Bind interface (0.0.0.0 for all interfaces)
  interface: 0.0.0.0
  # -- Additional ttyd CLI arguments
  extraArgs: ""
  # -- Readiness probe path
  probePath: /

# -- Kubernetes service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- ClusterIP port (maps to ttyd.port)
  port: 7681
  # -- Additional annotations
  annotations: {}

# -- Ingress configuration for browser access (Traefik)
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: "traefik"
  # -- Traefik entrypoints
  entrypoints:
    - websecure
  # -- Authentik forward-auth middleware reference (empty string to skip)
  # -- Format: <namespace>-<name>@kubernetescrd
  authentikMiddleware: "infra-authentik-forward-auth@kubernetescrd"
  # -- cert-manager cluster issuer for TLS
  clusterIssuer: "letsencrypt-prod"
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: executor.local
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration
  tls: []
  #  - hosts:
  #      - executor.local
  #    secretName: executor-tls

# -- Resource limits and requests
resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# -- Node selector, tolerations, and affinity
nodeSelector: {}
tolerations: []
affinity: {}

# -- Pod-level annotations
podAnnotations: {}

# -- Pod-level security context
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  supplementalGroups: []
  # -- Uncomment to run as non-root
  # runAsUser: 1000
  # runAsGroup: 1000

# -- Container-level security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# -- Environment variables injected directly into the container
extraEnv:
  # -- Additional env vars as a list of {name, value} or {name, valueFrom} maps
  []

# -- Extra volumes to mount (e.g. config maps, secrets)
extraVolumes: []
# - name: extra-config
#   configMap:
#     name: executor-extra-config

# -- Extra volume mounts for the main container
extraVolumeMounts: []
# - name: extra-config
#   mountPath: /etc/extra-config
#   readOnly: true

# -- ServiceAccount configuration
serviceAccount:
  # -- Create a service account for the pod
  create: true
  # -- ServiceAccount name (autogenerated if empty)
  name: ""
  # -- Additional annotations
  annotations: {}

# -- Secrets to create
secrets:
  # -- SSH private key for git operations (base64 encoded)
  sshPrivateKey: ""
  # -- Git token for HTTPS clone operations (base64 encoded)
  gitToken: ""

# -- Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- Liveness and readiness probe settings
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 2
    successThreshold: 1

# -- Update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0

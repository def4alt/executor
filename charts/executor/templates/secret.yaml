{{- if or .Values.secrets.sshPrivateKey .Values.secrets.gitToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "executor.fullname" . }}-git
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "executor.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.sshPrivateKey }}
  ssh-privatekey: {{ .Values.secrets.sshPrivateKey }}
  {{- end }}
  {{- if .Values.secrets.gitToken }}
  git-token: {{ .Values.secrets.gitToken }}
  {{- end }}
{{- end }}

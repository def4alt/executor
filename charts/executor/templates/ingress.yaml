{{- if .Values.ingress.enabled }}
{{- $apiVersion := include "executor.ingress.apiVersion" . -}}
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  name: {{ include "executor.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "executor.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.entrypoints }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ join "," . | quote }}
    {{- end }}
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- if .Values.ingress.authentikMiddleware }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.ingress.authentikMiddleware | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if and (eq $apiVersion "networking.k8s.io/v1") (semverCompare ">=1.18-0" $.Capabilities.KubeVersion.Version) }}
            pathType: {{ .pathType | default "Prefix" }}
            {{- end }}
            backend:
              {{- if eq $apiVersion "networking.k8s.io/v1" }}
              service:
                name: {{ include "executor.fullname" $ }}
                port:
                  name: ttyd
              {{- else }}
              serviceName: {{ include "executor.fullname" $ }}
              servicePort: ttyd
              {{- end }}
          {{- end }}
    {{- end }}
{{- end }}

spring:
  datasource:
    url: jdbc:h2:mem:executor;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  flyway:
    enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true

executor:
  flavors:
    - name: small-linux
      cpus: 1
      memory: 512
    - name: medium-linux
      cpus: 1
      memory: 1024
    - name: large-linux
      cpus: 2
      memory: 2048
